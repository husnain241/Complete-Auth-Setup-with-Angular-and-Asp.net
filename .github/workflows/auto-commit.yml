name: Daily Auto Commit

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * *'    # 9 AM Pakistan
    - cron: '0 6 * * *'    # 11 AM Pakistan
    - cron: '0 8 * * *'    # 1 PM Pakistan
    - cron: '0 9 * * *'    # 2 PM Pakistan
    - cron: '0 11 * * *'   # 4 PM Pakistan

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Keep Alive
        uses: gautamkrishnar/keepalive-workflow@v2

      - name: Daily Commit
        run: |
          git config user.email "alihusnaintcf970@gmail.com"
          git config user.name "husnain241"

          HOUR=$(date '+%H')

          if [ "$HOUR" = "15" ]; then
            MSG="feat: improve UI components"
          elif [ "$HOUR" = "16" ]; then
            MSG="fix: resolve minor bugs"
          elif [ "$HOUR" = "17" ]; then
            MSG="refactor: clean up code structure"
          elif [ "$HOUR" = "18" ]; then
            MSG="docs: update documentation"
          elif [ "$HOUR" = "19" ]; then
            MSG="chore: optimize performance"
          else
            MSG="chore: daily maintenance"
          fi

          echo "- $(date '+%Y-%m-%d %H:%M:%S') — $MSG" >> log.md
          git add .
          git commit -m "$MSG"
          git push
